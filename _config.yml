title: My Personal Blog
description: A personal blog about technology, life, and everything in between
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://jgchoi.github.io/" # the base hostname & protocol for your site, e.g. http://example.com

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git/

# Author information
author:
  name: choij
  email: choij@gmail.com