<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB to TXT Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        .container {
            text-align: center;
        }
        #dropZone {
            border: 2px dashed #ccc;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
        }
        #dropZone.dragover {
            background-color: #e1e1e1;
            border-color: #999;
        }
        #output {
            margin-top: 20px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>EPUB to TXT Converter</h1>
        <div id="dropZone">
            <p>Drop your EPUB file here or</p>
            <input type="file" id="fileInput" accept=".epub" />
        </div>
        <button id="convertBtn" disabled>Convert to TXT</button>
        <div id="output"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="converter.js"></script>
</body>
</html>
