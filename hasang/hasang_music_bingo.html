<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뮤직 빙고 (하상회 음악 빙고)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bingo-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.8rem;
            word-break: keep-all;
            padding: 0.25rem;
            line-height: 1.2;
        }
        .bingo-cell.checked {
            background-color: #3b82f6 !important;
            color: white !important;
            text-decoration: line-through;
        }
        .dark .bingo-cell.checked {
            background-color: #2563eb !important;
        }
        @media (min-width: 640px) {
            .bingo-cell { font-size: 1rem; padding: 0.5rem; }
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex flex-col items-center p-2 sm:p-4 transition-colors duration-300">

    <div class="max-w-2xl w-full bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-4 sm:p-6 transition-colors duration-300">
        <header class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 border-b dark:border-gray-700 pb-4">
            <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-start">
                <h1 class="text-2xl font-bold text-gray-800 dark:text-white tracking-tight">🎵 하상회 음악 빙고</h1>
                <button id="themeToggle" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-all shadow-sm">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
            </div>
            <button id="resetBtn" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-6 rounded-full shadow-lg transition-all transform active:scale-95 flex items-center justify-center gap-2">
                <i class="fas fa-redo-alt"></i> 보드 새로고침
            </button>
        </header>

        <!-- 로딩 상태 -->
        <div id="loading" class="flex flex-col items-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-200 dark:border-gray-700 border-t-indigo-600 dark:border-t-indigo-400 mb-4"></div>
            <p class="text-gray-500 dark:text-gray-400 font-medium">노래 목록을 가져오는 중...</p>
        </div>

        <!-- 빙고판 -->
        <div id="bingoContainer" class="hidden grid grid-cols-5 gap-1 sm:gap-2 bg-gray-200 dark:bg-gray-700 p-1 sm:p-2 rounded-xl shadow-inner border border-gray-300 dark:border-gray-600">
            <!-- 자바스크립트로 셀 주입 -->
        </div>

        <footer class="mt-8 text-center text-gray-400 dark:text-gray-500 text-xs sm:text-sm">
            <p><i class="fas fa-info-circle mr-1"></i> 칸을 클릭하면 마킹/해제 확인 창이 뜹니다.</p>
        </footer>
    </div>

    <!-- Custom Modal -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div id="modalContent" class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-sm w-full transform scale-95 transition-transform duration-300 overflow-hidden">
            <div class="p-6">
                <div id="modalIcon" class="w-12 h-12 rounded-full bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 flex items-center justify-center mb-4 mx-auto">
                    <i class="fas fa-question text-xl"></i>
                </div>
                <h3 id="modalTitle" class="text-xl font-bold text-gray-900 dark:text-white text-center mb-2">확인</h3>
                <p id="modalMessage" class="text-gray-600 dark:text-gray-400 text-center">정말로 진행하시겠습니까?</p>
            </div>
            <div class="flex flex-col border-t border-gray-100 dark:border-gray-700">
                <div id="modalExtraBtnContainer" class="hidden border-b border-gray-100 dark:border-gray-700">
                    <button id="modalEdit" class="w-full px-6 py-4 text-amber-600 dark:text-amber-400 font-bold hover:bg-amber-50 dark:hover:bg-amber-900/20 transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-edit"></i> 내용 수정하기
                    </button>
                </div>
                <div class="flex">
                    <button id="modalCancel" class="flex-1 px-6 py-4 text-gray-500 dark:text-gray-400 font-semibold hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors border-r border-gray-100 dark:border-gray-700">취소</button>
                    <button id="modalConfirm" class="flex-1 px-6 py-4 text-indigo-600 dark:text-indigo-400 font-bold hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-colors">확인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Input Modal -->
    <div id="inputModalOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div id="inputModalContent" class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-sm w-full transform scale-95 transition-transform duration-300 overflow-hidden">
            <div class="p-6">
                <div class="w-12 h-12 rounded-full bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 flex items-center justify-center mb-4 mx-auto">
                    <i class="fas fa-edit text-xl"></i>
                </div>
                <h3 id="inputModalTitle" class="text-xl font-bold text-gray-900 dark:text-white text-center mb-4">내용 입력</h3>
                <div class="relative">
                    <input type="text" id="customInput" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 focus:border-indigo-500 dark:focus:border-indigo-400 outline-none transition-all font-medium text-gray-700 dark:text-white placeholder-gray-400 dark:placeholder-gray-500" placeholder="내용을 입력하세요..." autofocus>
                </div>
            </div>
            <div class="flex border-t border-gray-100 dark:border-gray-700">
                <button id="inputModalCancel" class="flex-1 px-6 py-4 text-gray-500 dark:text-gray-400 font-semibold hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors border-r border-gray-100 dark:border-gray-700">취소</button>
                <button id="inputModalConfirm" class="flex-1 px-6 py-4 text-indigo-600 dark:text-indigo-400 font-bold hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-colors">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzyIKjzzM9MKwzztnEsosIpfDZXgLcGKGF16B14hzP4fX5cqrI2weBEi64h2ouj5mx_/exec';
        const STORAGE_KEY_DATA = 'bingo_current_data';
        const STORAGE_KEY_CHECKED = 'bingo_checked_indices';
        const STORAGE_KEY_THEME = 'bingo_theme';
        
        const bingoContainer = document.getElementById('bingoContainer');
        const resetBtn = document.getElementById('resetBtn');
        const loading = document.getElementById('loading');
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        // Theme Handling
        function initTheme() {
            const savedTheme = localStorage.getItem(STORAGE_KEY_THEME) || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                themeIcon.className = 'fas fa-sun';
            } else {
                document.documentElement.classList.remove('dark');
                themeIcon.className = 'fas fa-moon';
            }
        }

        themeToggle.onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem(STORAGE_KEY_THEME, isDark ? 'dark' : 'light');
            themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        };

        initTheme();

        // Modal Elements
        const modalOverlay = document.getElementById('modalOverlay');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalConfirm = document.getElementById('modalConfirm');
        const modalCancel = document.getElementById('modalCancel');
        const modalEdit = document.getElementById('modalEdit');
        const modalExtraBtnContainer = document.getElementById('modalExtraBtnContainer');

        // Input Modal Elements
        const inputModalOverlay = document.getElementById('inputModalOverlay');
        const inputModalContent = document.getElementById('inputModalContent');
        const inputModalTitle = document.getElementById('inputModalTitle');
        const inputModalConfirm = document.getElementById('inputModalConfirm');
        const inputModalCancel = document.getElementById('inputModalCancel');
        const customInput = document.getElementById('customInput');

        let currentBingoItems = [];
        let checkedIndices = new Set();

        // Custom Prompt Function
        function showPrompt(title, defaultValue = '') {
            return new Promise((resolve) => {
                inputModalTitle.textContent = title;
                customInput.value = defaultValue;
                
                inputModalOverlay.classList.remove('hidden');
                setTimeout(() => {
                    inputModalOverlay.classList.add('opacity-100');
                    inputModalContent.classList.remove('scale-95');
                    inputModalContent.classList.add('scale-100');
                    customInput.focus();
                }, 10);

                const cleanup = (val) => {
                    inputModalOverlay.classList.remove('opacity-100');
                    inputModalContent.classList.remove('scale-100');
                    inputModalContent.classList.add('scale-95');
                    setTimeout(() => {
                        inputModalOverlay.classList.add('hidden');
                    }, 300);
                    
                    inputModalConfirm.onclick = null;
                    inputModalCancel.onclick = null;
                    customInput.onkeyup = null;
                    resolve(val);
                };

                inputModalConfirm.onclick = () => cleanup(customInput.value);
                inputModalCancel.onclick = () => cleanup(null);
                customInput.onkeyup = (e) => {
                    if (e.key === 'Enter') cleanup(customInput.value);
                    if (e.key === 'Escape') cleanup(null);
                };
            });
        }

        // Custom Confirm Function (Promise based)
        function showConfirm(title, message, showEdit = false) {
            return new Promise((resolve) => {
                modalTitle.textContent = title;
                modalMessage.textContent = message;
                
                if (showEdit) {
                    modalExtraBtnContainer.classList.remove('hidden');
                } else {
                    modalExtraBtnContainer.classList.add('hidden');
                }
                
                // Show modal with animation
                modalOverlay.classList.remove('hidden');
                setTimeout(() => {
                    modalOverlay.classList.add('opacity-100');
                    modalContent.classList.remove('scale-95');
                    modalContent.classList.add('scale-100');
                }, 10);

                const cleanup = (result) => {
                    modalOverlay.classList.remove('opacity-100');
                    modalContent.classList.remove('scale-100');
                    modalContent.classList.add('scale-95');
                    setTimeout(() => {
                        modalOverlay.classList.add('hidden');
                    }, 300);
                    
                    modalConfirm.onclick = null;
                    modalCancel.onclick = null;
                    modalEdit.onclick = null;
                    resolve(result);
                };

                modalConfirm.onclick = () => cleanup('confirm');
                modalCancel.onclick = () => cleanup('cancel');
                modalEdit.onclick = () => cleanup('edit');
            });
        }

        // 셔플 알고리즘
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 로컬 스토리지 저장
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY_DATA, JSON.stringify(currentBingoItems));
            localStorage.setItem(STORAGE_KEY_CHECKED, JSON.stringify([...checkedIndices]));
        }

        // 로컬 스토리지 로드
        function loadFromStorage() {
            const savedData = localStorage.getItem(STORAGE_KEY_DATA);
            const savedChecked = localStorage.getItem(STORAGE_KEY_CHECKED);
            
            if (savedData) {
                currentBingoItems = JSON.parse(savedData);
                checkedIndices = new Set(JSON.parse(savedChecked || '[]'));
                return true;
            }
            return false;
        }

        // 보드 그리기
        function drawBoard() {
            bingoContainer.innerHTML = '';
            currentBingoItems.forEach((text, index) => {
                const cell = document.createElement('div');
                cell.className = 'bingo-cell bg-white dark:bg-gray-800 hover:bg-indigo-50 dark:hover:bg-gray-700 font-semibold text-gray-700 dark:text-gray-200 rounded-md shadow-sm border border-gray-100 dark:border-gray-700 relative transition-colors';
                
                if (index === 12) {
                    cell.classList.add('border-2', 'border-dashed', 'border-indigo-300', 'dark:border-indigo-500');
                    const savedCenterText = localStorage.getItem('bingo_center_text') || '입력하세요';
                    cell.innerHTML = `<div class="flex flex-col items-center">
                        <span class="text-[0.6rem] text-indigo-400 dark:text-indigo-300 absolute top-1 font-bold">BONUS</span>
                        <span class="center-text">${savedCenterText}</span>
                    </div>`;
                    
                    cell.onclick = async (e) => {
                        const isChecked = cell.classList.contains('checked');
                        const currentText = localStorage.getItem('bingo_center_text') || '입력하세요';
                        
                        if (currentText === '입력하세요') {
                            const newText = await showPrompt('보너스 칸 내용 입력', '');
                            if (newText !== null && newText.trim() !== '') {
                                const trimmedText = newText.trim();
                                localStorage.setItem('bingo_center_text', trimmedText);
                                cell.querySelector('.center-text').textContent = trimmedText;
                            }
                            return;
                        }

                        const action = await showConfirm('보너스 칸 관리', `"${currentText}" - 칸을 마킹하시겠습니까, 아니면 내용을 수정하시겠습니까?`, true);
                        
                        if (action === 'confirm') {
                            if (isChecked) {
                                cell.classList.remove('checked');
                                checkedIndices.delete(index);
                            } else {
                                cell.classList.add('checked');
                                checkedIndices.add(index);
                            }
                            saveToStorage();
                        } else if (action === 'edit') {
                            const newText = await showPrompt('보너스 칸 내용 수정', currentText);
                            if (newText !== null && newText.trim() !== '') {
                                const trimmedText = newText.trim();
                                localStorage.setItem('bingo_center_text', trimmedText);
                                cell.querySelector('.center-text').textContent = trimmedText;
                            }
                        }
                    };
                } else {
                    cell.textContent = text;
                    if (checkedIndices.has(index)) {
                        cell.classList.add('checked');
                    }
                    
                    cell.onclick = async () => {
                        const isChecked = cell.classList.contains('checked');
                        const title = isChecked ? '마킹 해제' : '칸 마킹';
                        const msg = isChecked ? `"${text}" 마킹을 해제하시겠습니까?` : `"${text}" 칸을 마킹하시겠습니까?`;
                        
                        const result = await showConfirm(title, msg);
                        if (result === 'confirm') {
                            if (isChecked) {
                                cell.classList.remove('checked');
                                checkedIndices.delete(index);
                            } else {
                                cell.classList.add('checked');
                                checkedIndices.add(index);
                            }
                            saveToStorage();
                        }
                    };
                }
                
                bingoContainer.appendChild(cell);
            });
            
            loading.classList.add('hidden');
            bingoContainer.classList.remove('hidden');
        }

        // 데이터 페칭 및 보드 생성
        async function initGame(forceFetch = false) {
            loading.classList.remove('hidden');
            bingoContainer.classList.add('hidden');

            if (!forceFetch && loadFromStorage()) {
                drawBoard();
                return;
            }

            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (!Array.isArray(data) || data.length < 1) {
                    throw new Error('데이터 형식이 올바르지 않습니다.');
                }

                let list = shuffle([...data]);
                currentBingoItems = list.slice(0, 25);
                checkedIndices = new Set();
                
                saveToStorage();
                drawBoard();

            } catch (err) {
                console.error(err);
                alert('데이터 로드 실패: ' + err.message);
                loading.classList.add('hidden');
            }
        }

        // 초기화 버튼
        resetBtn.onclick = async () => {
            if (await showConfirm('보드 초기화', '현재 진행 상황이 모두 사라집니다. 새로운 보드를 만드시겠습니까?')) {
                initGame(true);
            }
        };

        // 앱 시작
        initGame();
    </script>
</body>
</html>
